<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vibe Annotator Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
  <style>
    @keyframes shimmer {
      0% { background-position: 0% 0%; }
      25% { background-position: 100% 0%; }
      50% { background-position: 100% 100%; }
      75% { background-position: 0% 100%; }
      100% { background-position: 0% 0%; }
    }
    body { font-family: system-ui; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .hero { padding: 60px 0; }
    .hero h1 {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 64px;
      font-weight: 700;
      background:
        radial-gradient(ellipse at 20% 50%, #f9c4d2 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, #b5d8f7 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, #c9f0d8 0%, transparent 50%),
        radial-gradient(ellipse at 70% 60%, #e8d4f7 0%, transparent 50%),
        radial-gradient(ellipse at 30% 30%, #fde8b0 0%, transparent 50%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 6s ease infinite;
    }
    .hero p { font-size: 40px; color: #666; margin-top: 12px; }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; margin-top: 60px; padding: 20px 0; }
    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; gap: 48px; margin-top: 40px; }
    }
    .card { padding: 24px; border: 2px solid #ccc; border-radius: 8px; }
    .card:first-child { background: #1a6b3a; border-color: #1a6b3a; }
    .card:first-child h3, .card:first-child p { color: #fff; }
    .card:nth-child(2) {
      position: relative;
      border: none;
      padding: 26px;
      background: transparent;
    }
    .card:nth-child(2)::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 8px;
      padding: 2px;
      background: linear-gradient(135deg, #f9c4d2, #e8d4f7, #b5d8f7, #fde8b0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }
    .card h3 { font-size: 18px; margin-bottom: 8px; font-weight: 700; }
    .card p { color: #888; font-size: 14px; }
    .btn { display: inline-block; padding: 14px 28px; background: #4d94ff; color: white; border: none; border-radius: 8px; margin-top: 20px; font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>
  <section class="hero">
    <h1 data-testid="hero-title">Welcome to the Demo</h1>
    <p>Click elements to annotate them with feedback for your AI agent.</p>
    <button class="btn">Get Started</button>
  </section>
  <section class="cards">
    <div class="card">
      <h3>Feature One</h3>
      <p>Description of the first feature with some detail.</p>
    </div>
    <div class="card">
      <h3>Feature Two</h3>
      <p>Description of the second feature with some detail.</p>
    </div>
    <div class="card">
      <h3>Feature Three</h3>
      <p>Description of the third feature with some detail.</p>
    </div>
  </section>
</body>
</html>
